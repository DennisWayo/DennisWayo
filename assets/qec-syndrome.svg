<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated quantum error correction syndrome lattice</title>
  <desc id="desc">A stylized surface-code syndrome lattice with pulsing defects, decoder paths, and correction traces.</desc>

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="54%" stop-color="#0b1224"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>

    <linearGradient id="decode" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .label {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        fill: #cbd5e1;
        letter-spacing: .02em;
      }

      .subtle {
        fill: #94a3b8;
        font-size: 11px;
      }

      .grid {
        stroke: #94a3b8;
        stroke-width: 1.1;
        stroke-opacity: .28;
      }

      .node {
        fill: #0f172a;
        stroke: #64748b;
        stroke-width: 1.2;
      }

      .data {
        fill: #111827;
        stroke: #38bdf8;
        stroke-width: 1.4;
      }

      .defect {
        fill: #22d3ee;
        stroke: #e0f2fe;
        stroke-width: 1.4;
        filter: url(#glow);
      }

      .defect-alt {
        fill: #f472b6;
        stroke: #fce7f3;
      }

      .edge {
        fill: none;
        stroke: url(#decode);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 9 10;
        opacity: .8;
      }

      .correction {
        fill: none;
        stroke: #f59e0b;
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-dasharray: 1 12;
        opacity: .75;
      }

      .stream {
        fill: #22d3ee;
        opacity: .58;
      }
    </style>
  </defs>

  <rect x="10" y="10" width="740" height="240" rx="20" fill="url(#panel)" stroke="#1e293b"/>

  <text x="44" y="45" class="label">syndrome stream</text>
  <text x="584" y="45" class="label">decoder replay</text>
  <text x="44" y="226" class="label subtle">LiDMaS+ style QEC trace: defects -> matching graph -> correction</text>

  <g transform="translate(48 58)">
    <rect class="stream" x="0" y="0" width="8" height="28" rx="3">
      <animate attributeName="height" values="18;42;24;34;18" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;-4;6;2;10" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect class="stream" x="16" y="8" width="8" height="20" rx="3">
      <animate attributeName="height" values="24;16;40;22;24" dur="2.4s" begin=".2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;14;-2;8;6" dur="2.4s" begin=".2s" repeatCount="indefinite"/>
    </rect>
    <rect class="stream" x="32" y="2" width="8" height="32" rx="3">
      <animate attributeName="height" values="36;20;28;44;36" dur="2.6s" begin=".4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-2;10;6;-6;-2" dur="2.6s" begin=".4s" repeatCount="indefinite"/>
    </rect>
    <rect class="stream" x="48" y="12" width="8" height="18" rx="3">
      <animate attributeName="height" values="16;38;20;30;16" dur="2.3s" begin=".6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="12;-2;8;3;12" dur="2.3s" begin=".6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="lattice">
    <path class="grid" d="M140 70H620M140 130H620M140 190H620"/>
    <path class="grid" d="M140 70V190M220 70V190M300 70V190M380 70V190M460 70V190M540 70V190M620 70V190"/>

    <path class="grid" d="M140 70L220 130L300 70L380 130L460 70L540 130L620 70"/>
    <path class="grid" d="M140 190L220 130L300 190L380 130L460 190L540 130L620 190"/>

    <g>
      <circle class="node" cx="140" cy="70" r="5"/>
      <circle class="node" cx="220" cy="70" r="5"/>
      <circle class="node" cx="300" cy="70" r="5"/>
      <circle class="node" cx="380" cy="70" r="5"/>
      <circle class="node" cx="460" cy="70" r="5"/>
      <circle class="node" cx="540" cy="70" r="5"/>
      <circle class="node" cx="620" cy="70" r="5"/>

      <circle class="node" cx="140" cy="130" r="5"/>
      <circle class="node" cx="220" cy="130" r="5"/>
      <circle class="node" cx="300" cy="130" r="5"/>
      <circle class="node" cx="380" cy="130" r="5"/>
      <circle class="node" cx="460" cy="130" r="5"/>
      <circle class="node" cx="540" cy="130" r="5"/>
      <circle class="node" cx="620" cy="130" r="5"/>

      <circle class="node" cx="140" cy="190" r="5"/>
      <circle class="node" cx="220" cy="190" r="5"/>
      <circle class="node" cx="300" cy="190" r="5"/>
      <circle class="node" cx="380" cy="190" r="5"/>
      <circle class="node" cx="460" cy="190" r="5"/>
      <circle class="node" cx="540" cy="190" r="5"/>
      <circle class="node" cx="620" cy="190" r="5"/>
    </g>

    <path class="edge" d="M220 70C265 98 312 102 380 130">
      <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".25;.95;.65;.25" dur="3s" repeatCount="indefinite"/>
    </path>
    <path class="edge" d="M380 130C430 112 478 102 540 70">
      <animate attributeName="stroke-dashoffset" from="0" to="-36" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".25;.55;.95;.25" dur="3.2s" begin=".45s" repeatCount="indefinite"/>
    </path>
    <path class="correction" d="M220 70L300 70L380 130L460 130L540 70">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;.8;.35;.2" dur="3s" begin=".3s" repeatCount="indefinite"/>
    </path>

    <circle class="defect" cx="220" cy="70" r="7">
      <animate attributeName="r" values="6;12;6" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".9;.35;.9" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="defect defect-alt" cx="380" cy="130" r="7">
      <animate attributeName="r" values="5;11;5" dur="2.4s" begin=".35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".85;.3;.85" dur="2.4s" begin=".35s" repeatCount="indefinite"/>
    </circle>
    <circle class="defect" cx="540" cy="70" r="7">
      <animate attributeName="r" values="6;12;6" dur="2.6s" begin=".7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".9;.25;.9" dur="2.6s" begin=".7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(586 58)">
    <circle class="data" cx="0" cy="16" r="7">
      <animate attributeName="fill" values="#111827;#22d3ee;#111827" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle class="data" cx="28" cy="16" r="7">
      <animate attributeName="fill" values="#111827;#818cf8;#111827" dur="2.3s" begin=".35s" repeatCount="indefinite"/>
    </circle>
    <circle class="data" cx="56" cy="16" r="7">
      <animate attributeName="fill" values="#111827;#f472b6;#111827" dur="2.3s" begin=".7s" repeatCount="indefinite"/>
    </circle>
    <path d="M82 16h42" stroke="#38bdf8" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="4 7">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
